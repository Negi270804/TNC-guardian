version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tnc-guardian-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: tnc_guardian
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tnc-guardian-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: tnc-guardian-backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres_password@db:5432/tnc_guardian
      - JWT_SECRET=your_jwt_secret_key_placeholder_here
      - ANTHROPIC_API_KEY=your_anthropic_api_key_here
      - OPENAI_API_KEY=your_openai_api_key_here
      - AWS_ACCESS_KEY=your_aws_access_key_here
      - AWS_SECRET_KEY=your_aws_secret_key_here
      - S3_BUCKET=tnc-guardian-uploads
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: tnc-guardian-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
