version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tnc-guardian-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: TNC-guardian
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tnc-guardian-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: tnc-guardian-backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - FREE_PLAN_UPLOAD_LIMIT_MB=${FREE_PLAN_UPLOAD_LIMIT_MB:-5}
      - PRO_PLAN_UPLOAD_LIMIT_MB=${PRO_PLAN_UPLOAD_LIMIT_MB:-25}
      - OCR_USE_GPU=${OCR_USE_GPU:-true}
      - OCR_LANGUAGES=${OCR_LANGUAGES:-en}
      - RATE_LIMIT_LIMIT=${RATE_LIMIT_LIMIT:-15}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: tnc-guardian-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}
      - VITE_APP_NAME=${VITE_APP_NAME:-TNC Guardian}
      - VITE_ENV=${VITE_ENV:-development}
      - VITE_ENABLE_DEMO_MODE=${VITE_ENABLE_DEMO_MODE:-true}
    depends_on:
      - backend

volumes:
  pgdata:
