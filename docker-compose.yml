version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tnc-guardian-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-TNC-guardian}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tnc-network

  redis:
    image: redis:7-alpine
    container_name: tnc-guardian-redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - tnc-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tnc-guardian-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@db:5432/${POSTGRES_DB:-TNC-guardian}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - tnc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}
        - VITE_APP_NAME=${VITE_APP_NAME:-TNC Guardian}
        - VITE_ENV=${VITE_ENV:-production}
        - VITE_ENABLE_DEMO_MODE=${VITE_ENABLE_DEMO_MODE:-false}
    container_name: tnc-guardian-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tnc-network

volumes:
  pgdata:

networks:
  tnc-network:
    driver: bridge
